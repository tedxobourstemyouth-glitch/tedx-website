<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - TEDx</title>
  <style>
    body { font-family: 'IBM Plex Sans', sans-serif; padding: 20px; background: #111; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border: 1px solid #333; text-align: left; }
    th { background: #E62B1E; color: white; }
    a { color: #E62B1E; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100px; max-height: 100px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🎟️ TEDx Ticket Requests</h1>
  <div style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Search by name, phone, governorate..." style="padding: 10px 15px; width: 100%; max-width: 350px; box-sizing: border-box; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; font-family: inherit;">
    <button onclick="exportToCSV()" style="padding: 10px 20px; background: #E62B1E; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; white-space: nowrap;">Download CSV 📥</button>
  </div>
  <div style="overflow-x: auto; width: 100%;">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Governorate</th>
        <th>School Name</th>
        <th>Promo Code</th>
        <th>Transfer From</th>
        <th>Date Submitted</th>
        <th>Screenshot</th>
        <th>Status</th>
        <th>Check-in (Door)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="data-table">
      <tr><td colspan="8">Loading data...</td></tr>
    </tbody>
  </table>
  </div>

  <script>
    let allData = [];

    fetch('/api/admin/data')
      .then(res => res.json())
      .then(data => {
        allData = data.reverse(); // Show newest requests first
        renderTable(allData);
      });

    function renderTable(data) {
        const tbody = document.getElementById('data-table');
        tbody.innerHTML = '';
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding: 20px;">No requests found.</td></tr>';
          return;
        }
        data.forEach(row => {
          const fileName = row.screenshotPath ? row.screenshotPath.split('\\').pop().split('/').pop() : '';
          const imgHtml = fileName ? `<a href="/uploads/${fileName}" target="_blank"><img src="/uploads/${fileName}" alt="Receipt"></a>` : 'No Image';
          const status = row.status || 'pending';
          const statusColor = status === 'approved' ? '#28a745' : '#ffc107';
          const btnDisabled = status === 'approved' ? 'disabled style="background:#555;color:#999;border:none;padding:6px 10px;border-radius:4px;"' : 'style="cursor:pointer;background:#E62B1E;color:white;border:none;padding:6px 10px;border-radius:4px;"';

          tbody.innerHTML += `
            <tr>
              <td>${row.full_name}</td><td>${row.email}</td><td>${row.phone}</td>
              <td>${row.governorate} (${row.quantity})</td><td>${row.school_name || '-'}</td>
              <td><span style="color:var(--red); font-weight:bold;">${row.promo_code || '-'}</span></td>
              <td>${row.transfer_number || '-'}</td>
              <td>${row.date}</td><td>${imgHtml}</td>
              <td><span style="background:${statusColor};color:#000;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:bold;">${status.toUpperCase()}</span></td>
              <td><span style="font-weight:bold; color:${row.checked_in ? '#28a745' : '#ccc'}">${row.checked_in ? '✅ Inside' : '❌ Waiting'}</span></td>
              <td><button onclick="approveTicket(${row.id})" ${btnDisabled}>${status === 'approved' ? 'Approved' : 'Approve'}</button></td>
            </tr>`;
        });
    }

    function filterTable() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allData.filter(row =>
        row.full_name.toLowerCase().includes(query) ||
        row.phone.includes(query) ||
        row.governorate.toLowerCase().includes(query) ||
        (row.promo_code && row.promo_code.toLowerCase().includes(query))
      );
      renderTable(filtered);
    }

    function exportToCSV() {
      const headers = ['ID', 'Date', 'Status', 'Full Name', 'Email', 'Phone', 'Governorate', 'Quantity', 'School', 'Promo Code', 'Transfer Number'];
      let csvContent = headers.join(',') + '\n';

      allData.forEach(row => {
        const rowData = [
          row.id,
          `"${row.date}"`,
          row.status,
          `"${row.full_name}"`,
          row.email,
          row.phone,
          `"${row.governorate}"`,
          row.quantity,
          `"${row.school_name || ''}"`,
          `"${row.promo_code || ''}"`,
          row.transfer_number || ''
        ];
        csvContent += rowData.join(',') + '\n';
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', 'tedx_tickets.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Approve ticket and send QR code function
    function approveTicket(id) {
      if(!confirm('Are you sure you want to approve this ticket and send the QR code?')) return;
      
      fetch('/api/admin/approve/' + id, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
          alert(data.message);
          location.reload(); // Reload page to see changes
        })
        .catch(err => alert('Error approving ticket'));
    }
  </script>
</body>
</html>
